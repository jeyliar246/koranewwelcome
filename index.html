<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Kora AI</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="background">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>
    
    <div class="container">
        <div class="glass-card">
            <div class="logo-container">
                <h1 class="logo">Kora AI</h1>
                <div class="logo-subtitle">Your Intelligent Service Assistant</div>
            </div>
            
            <div class="welcome-section">
                <h2 class="welcome-text">Welcome to the Future of Service</h2>
                <p class="description">
                    Experience seamless booking, delivery, and assistance with AI-powered precision.
                    Simply ask, and we'll make it happen.
                </p>
            </div>
            
            <div class="prompt-section">
                <div class="prompt-label">Try asking:</div>
                <div class="typewriter-container">
                    <span class="typewriter-text" id="typewriter"></span>
                    <span class="cursor">|</span>
                </div>
            </div>
            
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">✈️</div>
                    <div class="feature-text">Book Flights</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📦</div>
                    <div class="feature-text">Delivery Services</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🏠</div>
                    <div class="feature-text">Find Properties</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💱</div>
                    <div class="feature-text">Real-time Rates</div>
                </div>
            </div>
            
            <div class="cta-section">
                <button class="cta-button">Get Started</button>
            </div>
        </div>
    </div>
    
    <script src="/main.js"></script>
</body>
</html>
