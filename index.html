<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - Kora App</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="success-icon">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M8 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            
            <h1 class="title">Email Verification Successful</h1>
            
            <p class="welcome-message">Welcome to the Kora App!</p>
            
            <p class="instruction">Your email has been successfully verified. Please go back to the app and login to continue.</p>
            
            <div class="features-checklist">
                <h2 class="features-title">What you can do on the Kora App:</h2>
                <ul class="checklist">
                    <li class="checklist-item">
                        <span class="check-icon">✓</span>
                        <span>Book Flights</span>
                    </li>
                    <li class="checklist-item">
                        <span class="check-icon">✓</span>
                        <span>Book Luxury Cars</span>
                    </li>
                    <li class="checklist-item">
                        <span class="check-icon">✓</span>
                        <span>Book Services</span>
                    </li>
                    <li class="checklist-item">
                        <span class="check-icon">✓</span>
                        <span>Find Events</span>
                    </li>
                </ul>
            </div>
            
            <button class="back-button" onclick="goBack()">Go Back to App</button>
        </div>
    </div>
    
    <script src="/main.js"></script>
</body>
</html>
